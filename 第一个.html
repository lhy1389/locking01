<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的第一个网页</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      text-align: center;
      padding: 50px 20px;
    }
    h1 {
      color: #4a6fa6;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    footer {
      margin-top: 30px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 欢迎来到我的网站！</h1>
    <p>这是一个用纯 HTML + CSS 编写的静态网页。</p>
    <p>你可以将这个文件部署到 <strong>Vercel</strong>、<strong>GitHub Pages</strong> 或其他平台，</p>
    <p>然后通过一个公开网址分享给全世界！</p>

    <button onclick="alert('你好！')">点我试试 😊</button>
  </div>

  <footer>
    &copy; 2026 我的个人网站 | 部署成功 ✅
  </footer>
</body>
</html>
